# ── Site identity ────────────────────────────────────────────────
title: Xariv Engineering
tagline: Case studies & engineering deep-dives from the Xariv team
description: >-
  Practical engineering write-ups and case studies from Xariv — how we
  build systems, solve hard problems, and ship reliable software.
author: Xariv
email: hello@xariv.com

# ── URLs ─────────────────────────────────────────────────────────
# If repo is named "xariv-blog" -> baseurl: "/xariv-blog"
# If repo is named "<username>.github.io" (user site) -> baseurl: ""
url: "https://manojkumar-github.github.io"
baseurl: ""

# ── Build ────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
